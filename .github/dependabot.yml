# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  # Main dependencies using bun
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    # Limit open PRs to avoid overwhelming maintainers
    open-pull-requests-limit: 5
    # Group minor/patch updates for the same package
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Add labels to PRs
    labels:
      - "dependencies"
      - "security"
    # Commit message configuration
    commit-message:
      prefix: "deps"
      include: "scope"
    # Ignore specific packages if needed (uncomment to use)
    # ignore:
    #   - dependency-name: "some-package"
    #     versions: ["x.y.z"]

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
